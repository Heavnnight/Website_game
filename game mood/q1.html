<!DOCTYPE html>
<html>
<head>
  <title>Question 1</title>

  <style>
    @font-face {
      font-family: myFont;
      src: url("font.ttf");
    }

    body{
      margin:0;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:black;
      font-family: myFont, sans-serif;
    }

    .console{
      position:relative;
      width:1100px;
    }

    .bg{
      width:100%;
      display:block;
    }

    /* فوق = الأجوبة */
    .top-screen{
      position:absolute;
      top:18%;
      left:54%;
      transform:translateX(-50%);
      width:38%;
      height:18%;

      display:flex;
      justify-content:center;
      align-items:center;
      gap:100px;
    }

    /* تحت = السؤال */
    .bottom-screen{
      position:absolute;
      top:65%;
      left:40%;
      width:30%;
      height:12%;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
      font-size:40px;
    }

    button{
      font-family: myFont, sans-serif;
      font-size:34px;
      padding:20px 50px;
      cursor:pointer;
      border:none;
      border-radius:18px;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.1);
    }

    p{
      margin:0;
    }
  </style>
</head>

<body>

  <div class="console">
    <img src="3ds.png" class="bg">

    <!-- الأجوبة -->
    <div class="top-screen">
      <button onclick="next('fast')">Fast</button>
      <button onclick="next('slow')">Slow</button>
    </div>

    <!-- السؤال -->
    <div class="bottom-screen">
      <p>Do you want to play something fast or slow?</p>
    </div>

  </div>

  <script>
    function next(answer){
      localStorage.setItem("q1", answer);
      window.location.href = "q2.html";
    }
  </script>

</body>
</html>
