<!DOCTYPE html>
<html>
<head>
  <title>Question 8</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .console{
      width:1300px;
      left:-440px;
      top:-20px;
      z-index:1;
    }

    .console img{
      width:100%;
    }

    .answers{
      position:absolute;
      top:140px;
      left:55px;
      display:grid;
      grid-template-columns: repeat(1, 1fr);
      gap:25px;
      width:410px;
      z-index:10;
    }

    button{
      font-family: myFont, sans-serif;
      font-size:38px;
      padding:22px 20px;
      border:none;
      border-radius:18px;
      cursor:pointer;
      background: linear-gradient(45deg, #ffb0d9, #ffffff);
      color:white;
      box-shadow:0 0 15px rgba(255, 105, 180, 0.6);
      transition:0.2s;
      line-height:1.2;
    }

    button:hover{
      transform:scale(1.06);
      box-shadow:0 0 25px rgba(255, 105, 180, 0.9);
    }

    .question{
      position:absolute;
      top:570px;
      left:60px;
      width:430px;
      color:white;
      font-size:48px;
      z-index:10;
      line-height:1.2;
    }
  </style>
</head>

<body>
  <div class="layout">

    <div class="speech-bubble">
      <span id="typeText"></span><span class="cursor">|</span>
    </div>

    <div class="console">
      <img src="3ds.png" alt="3DS">
    </div>

    <img src="sweetheart.gif" class="character" alt="Sweetheart">

    <div class="answers">
      <button onclick="nextAnswer('familiar')">Something familiar</button>
      <button onclick="nextAnswer('different')">Something different</button>
    </div>

    <div class="question">
      What are you in the mood for?
    </div>

  </div>

  <script>
    function nextAnswer(answer){
      localStorage.setItem("q7", answer);
      window.location.href = "result.html";
    }

    const message = "Alright... I think I have enough to decide";
    const target = document.getElementById("typeText");
    let i = 0;

    function typeWriter(){
      if(i < message.length){
        target.innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
      }
    }

    typeWriter();
  </script>
</body>
</html>
