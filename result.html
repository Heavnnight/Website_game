<!DOCTYPE html>
<html>
<head>
  <title>Result</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .console{
      width:1300px;
      left:-440px;
      top:-20px;
      z-index:1;
    }

    .console img{
      width:100%;
    }

    .character{
      top:180px;
    }

    .game-text{
      position:absolute;
      top:110px;
      left:50px;
      width:420px;
      color:rgb(255, 65, 144);
      font-size:43px;
      z-index:10;
      line-height:1.5;
    }

    .result{
      position:absolute;
      top:580px;
      left:65px;
      width:420px;
      color:white;
      font-size:50px;
      z-index:10;
      line-height:1.2;
      text-shadow:0 0 12px rgba(255, 105, 180, 0.8);
      white-space:pre-line;
    }
  </style>
</head>

<body>

  <div class="layout">

    <div class="speech-bubble">
      <span id="bubbleText"></span><span class="cursor">|</span>
    </div>

    <div class="console">
      <img src="3ds.png" alt="3DS">
    </div>

    <img src="sweetheart.gif" class="character" alt="Sweetheart">

    <div class="game-text" id="gameText"></div>
    <div class="result" id="resultText"></div>

  </div>

  <script>
    const mood = (localStorage.getItem("mood") || "").toLowerCase();
    const q1 = (localStorage.getItem("q1") || "").toLowerCase();
    const q2 = (localStorage.getItem("q2") || "").toLowerCase();
    const q3 = (localStorage.getItem("q3") || "").toLowerCase();
    const q4 = (localStorage.getItem("q4") || "").toLowerCase();
    const q6 = (localStorage.getItem("q6") || "").toLowerCase();
    const q7 = (localStorage.getItem("q7") || "").toLowerCase();
    const q8 = (localStorage.getItem("q8") || "").toLowerCase();

    const games = {
      "Silent Hill 2": {
        score: 0,
        text: "you seem ready for something emotional, and unsettling this one fits that mood really well"
      },
      "Stardew Valley": {
        score: 0,
        text: "you seem like you need something gentle and low pressure this is calm familiar and easy to stay with"
      },
      "Mario Kart": {
        score: 0,
        text: "this is a good match if you want something energetic social, and easy to jump into."
      },
      "Life is Strange": {
        score: 0,
        text: "you seem drawn to emotional and story driven experiences,so this is the right choice."
      },
      "Cyberpunk 2077": {
        score: 0,
        text: "you want something active and intense, so this makes sense for you right now."
      },
      "The Legend of Zelda": {
        score: 0,
        text: "you seem to want something immersive and rewarding that you can stay with for a while"
      },
      "Deltarune": {
        score: 0,
        text: "this fits if you want something familiar feeling but still interesting playful and story rich."
      },
      "Fran Bow": {
        score: 0,
        text: "you seem open to something different and strange, so this is a strong match."
      },
      "Overcooked": {
        score: 0,
        text: "if you want something lively and social without overthinking too much this works really well"
      }
    };

    function addPoints(gameName, points) {
      games[gameName].score += points;
    }

    if (mood === "stressed") {
      addPoints("Stardew Valley", 3);
      addPoints("Deltarune", 1);
    }
    if (mood === "sad") {
      addPoints("Life is Strange", 3);
      addPoints("Silent Hill 2", 1);
    }
    if (mood === "happy") {
      addPoints("Mario Kart", 3);
      addPoints("Overcooked", 2);
    }
    if (mood === "angry") {
      addPoints("Cyberpunk 2077", 3);
      addPoints("Silent Hill 2", 1);
    }
    if (mood === "neutral") {
      addPoints("The Legend of Zelda", 2);
      addPoints("Deltarune", 2);
    }

    if (q1 === "emotional") {
      addPoints("Life is Strange", 3);
      addPoints("Silent Hill 2", 2);
    }
    if (q1 === "stimulating") {
      addPoints("Mario Kart", 2);
      addPoints("Cyberpunk 2077", 2);
      addPoints("The Legend of Zelda", 1);
    }
    if (q1 === "action") {
      addPoints("Cyberpunk 2077", 3);
      addPoints("Mario Kart", 1);
    }
    if (q1 === "horror") {
      addPoints("Silent Hill 2", 4);
      addPoints("Fran Bow", 2);
    }

    if (q2 === "low focus") {
      addPoints("Stardew Valley", 3);
      addPoints("Mario Kart", 1);
    }
    if (q2 === "high focus") {
      addPoints("Cyberpunk 2077", 2);
      addPoints("Silent Hill 2", 2);
      addPoints("The Legend of Zelda", 1);
    }

    if (q3 === "short time") {
      addPoints("Mario Kart", 2);
      addPoints("Overcooked", 2);
    }
    if (q3 === "long time") {
      addPoints("The Legend of Zelda", 3);
      addPoints("Stardew Valley", 2);
      addPoints("Cyberpunk 2077", 1);
    }

    if (q4 === "alone") {
      addPoints("Silent Hill 2", 1);
      addPoints("Life is Strange", 2);
      addPoints("Stardew Valley", 2);
      addPoints("Fran Bow", 2);
      addPoints("The Legend of Zelda", 1);
    }
    if (q4 === "friends") {
      addPoints("Mario Kart", 4);
      addPoints("Overcooked", 4);
    }

    if (q6 === "immersive") {
      addPoints("Life is Strange", 2);
      addPoints("Silent Hill 2", 2);
      addPoints("The Legend of Zelda", 3);
    }
    if (q6 === "direct") {
      addPoints("Mario Kart", 2);
      addPoints("Cyberpunk 2077", 2);
      addPoints("Overcooked", 2);
    }

    if (q7 === "comfortable") {
      addPoints("Stardew Valley", 3);
      addPoints("Deltarune", 2);
      addPoints("The Legend of Zelda", 1);
    }
    if (q7 === "surprise") {
      addPoints("Silent Hill 2", 3);
      addPoints("Fran Bow", 3);
      addPoints("Cyberpunk 2077", 1);
    }

    if (q8 === "familiar") {
      addPoints("Stardew Valley", 2);
      addPoints("Mario Kart", 2);
      addPoints("The Legend of Zelda", 2);
    }
    if (q8 === "different") {
      addPoints("Fran Bow", 3);
      addPoints("Silent Hill 2", 1);
      addPoints("Deltarune", 1);
    }

    let bestGame = "";
    let bestScore = -1;

    for (const game in games) {
      if (games[game].score > bestScore) {
        bestScore = games[game].score;
        bestGame = game;
      }
    }

    document.getElementById("gameText").innerText = games[bestGame].text;
    document.getElementById("resultText").innerText =
      "Sweetheart recommends...\n" + bestGame;

    const bubble = "this is the right choice for your mood right now. enjoy it... and if you don't like it, that's your problem.";

    const target = document.getElementById("bubbleText");
    let i = 0;

    function typeWriter(){
      if(i < bubble.length){
        target.innerHTML += bubble.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
      }
    }

    typeWriter();
  </script>

</body>
</html>
