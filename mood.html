<!DOCTYPE html>
<html>
<head>
  <title>Mood</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .console{
      width:1300px;
      left:-440px;
      top:-20px;
      z-index:1;
    }

    .console img{
      width:100%;
    }

    .character{
      left:700px;
      top:200px;
    }

    .speech-bubble{
      top:30px;
      right:120px;
    }

    .speech-bubble::after{
      right:40px;
    }

    .question{
      position:absolute;
      top:590px;
      left:60px;
      width:400px;
      color:white;
      font-size:50px;
      z-index:10;
      line-height:1.2;
    }

    .mood{
      position:absolute;
      width:140px;
      cursor:pointer;
      transition:0.2s;
      z-index:10;
    }

    .mood:hover{
      transform:scale(1.1);
    }

    .neutral{
      top:65px;
      left:250px;
      transform:translateX(-50%);
    }

    .neutral:hover{
      transform:translateX(-50%) scale(1.1);
    }

    .angry{
      top:110px;
      left:40px;
    }

    .sad{
      top:110px;
      left:320px;
    }

    .happy{
      top:250px;
      left:110px;
    }

    .stressed{
      top:250px;
      left:260px;
    }
  </style>
</head>

<body>
  <div class="layout">

    <div class="speech-bubble">
      <span id="typeText"></span><span class="cursor">|</span>
    </div>

    <div class="console">
      <img src="3ds.png" alt="3DS">
    </div>

    <img src="sweetheart.gif" class="character" alt="Sweetheart">

    <img src="Neutral.png" class="mood neutral" onclick="chooseMood('neutral')">
    <img src="angry.png" class="mood angry" onclick="chooseMood('angry')">
    <img src="sad.png" class="mood sad" onclick="chooseMood('sad')">
    <img src="happy.png" class="mood happy" onclick="chooseMood('happy')">
    <img src="stressed.png" class="mood stressed" onclick="chooseMood('stressed')">

    <div class="question">
      How do you feel today?
    </div>

  </div>

  <script>
    function chooseMood(mood){
      localStorage.setItem("mood", mood);
      window.location.href = "q1.html";
    }

    const message = "im listening";
    const target = document.getElementById("typeText");
    let i = 0;

    function typeWriter(){
      if(i < message.length){
        target.innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
      }
    }

    typeWriter();
  </script>
</body>
</html>
