<!DOCTYPE html>
<html>
<head>
  <title>Question 5</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .console{
      width:1300px;
      left:-440px;
      top:-20px;
      z-index:1;
    }

    .console img{
      width:100%;
    }

    .answers{
      position:absolute;
      top:190px;
      left:40px;
      display:flex;
      gap:30px;
      z-index:10;
    }

    button{
      font-family: myFont, sans-serif;
      font-size:50px;
      padding:18px 45px;
      border:none;
      border-radius:18px;
      cursor:pointer;
      background: linear-gradient(45deg, #ffa2d2, #ffffff);
      color:white;
      box-shadow:0 0 15px rgba(255, 105, 180, 0.6);
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.1);
      box-shadow:0 0 25px rgba(255, 105, 180, 0.9);
    }

    .question{
      position:absolute;
      top:560px;
      left:100px;
      width:420px;
      color:white;
      font-size:46px;
      z-index:10;
      line-height:1.2;
    }
  </style>
</head>

<body>
  <div class="layout">

    <div class="speech-bubble">
      <span id="typeText"></span><span class="cursor">|</span>
    </div>

    <div class="console">
      <img src="3ds.png" alt="3DS">
    </div>

    <img src="sweetheart.gif" class="character" alt="Sweetheart">

    <div class="answers">
      <button onclick="nextAnswer('Alone')">Alone</button>
      <button onclick="nextAnswer('Friends')">Friends</button>
    </div>

    <div class="question">
      Do you want to play alone or with friends?
    </div>

  </div>

  <script>
    function nextAnswer(answer){
      localStorage.setItem("q4", answer);
      window.location.href = "q6.html";
    }

    const message = "Be honest now...";
    const target = document.getElementById("typeText");
    let i = 0;

    function typeWriter(){
      if(i < message.length){
        target.innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
      }
    }

    typeWriter();
  </script>
</body>
</html>
